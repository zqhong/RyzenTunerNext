---
name: Build Windows

on:
  push:
    branches: ["*"]

env:
  DOTNET_VERSION: "10.0.x"
  BUILD_CONFIGURATION: "Release"
  BUILD_PLATFORM: "x64"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    name: Build & Package
    runs-on: windows-latest

    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      # 设置 .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 显示环境信息
      - name: Environment Info
        run: |
          Write-Host "=== .NET SDK ==="
          dotnet --version
          dotnet --list-sdks
          Write-Host ""
          Write-Host "=== OS Info ==="
          [System.Environment]::OSVersion
          Write-Host ""
          Write-Host "=== MSBuild ==="
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
          if ($msbuild) { & $msbuild -version } else { Write-Host "MSBuild not found via vswhere" }
        shell: pwsh

      # 还原 NuGet 包
      - name: Restore
        run: dotnet restore RyzenTunerNext.sln --verbosity minimal

      # 编译 Debug
      - name: Build Debug
        run: |
          dotnet build RyzenTunerNext.sln `
            -c Debug `
            -p:Platform=${{ env.BUILD_PLATFORM }} `
            --no-restore `
            --verbosity normal
        shell: pwsh

      # 编译 Release
      - name: Build Release
        run: |
          dotnet build RyzenTunerNext.sln `
            -c ${{ env.BUILD_CONFIGURATION }} `
            -p:Platform=${{ env.BUILD_PLATFORM }} `
            --no-restore `
            --verbosity minimal `
            -consoleLoggerParameters:ErrorsOnly
        shell: pwsh

      # 发布 App
      - name: Publish App
        run: |
          dotnet publish src/RyzenTunerNext.App/RyzenTunerNext.App.csproj `
            -c ${{ env.BUILD_CONFIGURATION }} `
            -p:Platform=${{ env.BUILD_PLATFORM }} `
            -o publish/app `
            --verbosity minimal
        shell: pwsh

      # 发布 Service
      - name: Publish Service
        run: |
          dotnet publish src/RyzenTunerNext.Service/RyzenTunerNext.Service.csproj `
            -c ${{ env.BUILD_CONFIGURATION }} `
            -p:Platform=${{ env.BUILD_PLATFORM }} `
            -o publish/service `
            --verbosity minimal
        shell: pwsh

      # 清理不需要的文件
      - name: Cleanup Publish Output
        run: |
          Write-Host "=== 清理 App 产物 ==="

          # 移除 locale 目录（WinUI MUI 资源，zh-CN / zh-TW / en-us 保留）
          $keepLocales = @("zh-CN", "zh-TW", "en-us")
          Get-ChildItem publish\app -Directory | Where-Object {
            $_.Name -match '^[a-z]{2,3}(-[A-Za-z]+){1,2}$' -and $_.Name -notin $keepLocales
          } | ForEach-Object {
            Write-Host "  移除 locale: $($_.Name)"
            Remove-Item $_.FullName -Recurse -Force
          }

          # 移除 NpuDetect（NPU 检测，本工具不需要）
          if (Test-Path "publish\app\NpuDetect") {
            Write-Host "  移除 NpuDetect/"
            Remove-Item "publish\app\NpuDetect" -Recurse -Force
          }

          # 移除 createdump.exe（诊断工具）
          Get-ChildItem publish\app -Filter "createdump.exe" -Recurse | ForEach-Object {
            Write-Host "  移除 $($_.Name)"
            Remove-Item $_.FullName -Force
          }

          # 移除 .pdb 文件（调试符号）
          Get-ChildItem publish\app -Filter "*.pdb" -Recurse | ForEach-Object {
            Write-Host "  移除 $($_.Name)"
            Remove-Item $_.FullName -Force
          }

          Write-Host ""
          Write-Host "=== 清理 Service 产物 ==="

          # 移除 Service 中的 locale 目录
          Get-ChildItem publish\service -Directory | Where-Object {
            $_.Name -match '^[a-z]{2,3}(-[A-Za-z]+){1,2}$'
          } | ForEach-Object {
            Write-Host "  移除 locale: $($_.Name)"
            Remove-Item $_.FullName -Recurse -Force
          }

          # 移除 Service 中的 createdump.exe 和 .pdb
          Get-ChildItem publish\service -Filter "createdump.exe" | ForEach-Object {
            Write-Host "  移除 $($_.Name)"
            Remove-Item $_.FullName -Force
          }
          Get-ChildItem publish\service -Filter "*.pdb" | ForEach-Object {
            Write-Host "  移除 $($_.Name)"
            Remove-Item $_.FullName -Force
          }

          Write-Host ""
          Write-Host "=== 清理完成 ==="
        shell: pwsh

      # 合并 Service 到 App 目录的 Service/ 子目录
      - name: Package Artifacts
        run: |
          Write-Host "=== 合并 Service 到 App 目录 ==="
          New-Item -ItemType Directory -Path "publish\app\Service" -Force | Out-Null
          Copy-Item -Path "publish\service\*" -Destination "publish\app\Service\" -Recurse -Force

          Write-Host ""
          Write-Host "=== 根目录内容 ==="
          Get-ChildItem publish\app -Name | ForEach-Object { Write-Host "  $_" }
          Write-Host ""
          Write-Host "=== Service/ 子目录内容 ==="
          Get-ChildItem publish\app\Service -Name | ForEach-Object { Write-Host "  $_" }

          Write-Host ""
          $rootFiles = (Get-ChildItem publish\app -File | Measure-Object).Count
          $rootDirs = (Get-ChildItem publish\app -Directory | Measure-Object).Count
          $svcFiles = (Get-ChildItem publish\app\Service -File | Measure-Object).Count
          Write-Host "=== 统计 ==="
          Write-Host "  根目录: ${rootFiles} 文件, ${rootDirs} 目录"
          Write-Host "  Service/: ${svcFiles} 文件"
        shell: pwsh

      # 输出构建摘要
      - name: Build Summary
        run: |
          $summary = @"
          ## 构建结果

          | 配置 | 值 |
          |------|-----|
          | 配置 | ${{ env.BUILD_CONFIGURATION }} |
          | 平台 | ${{ env.BUILD_PLATFORM }} |
          | 目标框架 | net10.0-windows10.0.22621.0 |
          | 运行器 | windows-latest |

          ### 根目录内容
          ``````text
          $(Get-ChildItem publish\app -Name | Select-Object -First 20 | Out-String)
          ``````

          ### Service/ 子目录内容
          ``````text
          $(Get-ChildItem publish\app\Service -Name | Select-Object -First 20 | Out-String)
          ``````
          "@

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        shell: pwsh

      # 上传产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RyzenTunerNext
          path: publish/app/
          retention-days: 30

      # 失败时输出详细日志
      - name: Failure Diagnostics
        if: failure()
        run: |
          Write-Host "========================================="
          Write-Host "  构建失败 - 详细诊断信息"
          Write-Host "========================================="
          Write-Host ""

          Write-Host "=== NuGet 缓存位置 ==="
          dotnet nuget locals all --list
          Write-Host ""

          Write-Host "=== 已安装的工作负载 ==="
          dotnet workload list
          Write-Host ""

          Write-Host "=== 项目文件检查 ==="
          Get-ChildItem -Recurse -Filter "*.csproj" | ForEach-Object {
            Write-Host "  $($_.FullName)"
          }
          Write-Host ""

          Write-Host "=== bin/obj 目录状态 ==="
          if (Test-Path "src") {
            Get-ChildItem src -Recurse -Directory -Filter "bin" | ForEach-Object {
              Write-Host "  $($_.FullName): $(Get-ChildItem $_.FullName -Recurse -File | Measure-Object | Select-Object -ExpandProperty Count) files"
            }
          }
        shell: pwsh
